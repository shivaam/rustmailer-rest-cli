          "flags": {
            "description": "The flags associated with the email (e.g., `\\Seen`, `\\Answered`, `\\Flagged`).\nRepresented as a list of `EnvelopeFlag` for standard or custom flags.\n\n**Note:** Available only for IMAP accounts.",
            "items": {
              "$ref": "#/components/schemas/EnvelopeFlag"
