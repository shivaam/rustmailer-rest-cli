            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": ""
          },
          "default": {
            "content": {
              "application/json; charset=utf-8": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            },
            "description": ""
          }
        },
        "summary": "Configures an external OAuth2 token for a specified account.",
        "tags": [
          "OAuth2"
        ]
      }
    },
