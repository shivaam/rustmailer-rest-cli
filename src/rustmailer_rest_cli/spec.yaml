  "info": {
    "contact": {
      "email": "rustmailer.git@gmail.com"
    },
    "description": "\n    RustMailer is a self-hosted IMAP/SMTP middleware platform designed for developers and businesses seeking a robust, scalable, and secure email solution.\n\n    - Provides seamless IMAP synchronization and reliable SMTP sending via blazing-fast REST and gRPC APIs.\n    - Supports programmable email workflows, customizable filters, and webhook notifications.\n    - Offers multi-account synchronization, license-based access control, and a built-in web UI for easy management.\n\n    Whether you're building SaaS platforms, CRM systems, or customer support tools, RustMailer delivers high performance and full control over your email infrastructure.\n",
    "license": {
      "name": "https://rustmailer.com/license"
    },
    "summary": "A self-hosted IMAP/SMTP middleware designed for developers",
    "title": "RustMailerApi",
    "version": "1.5.3"
  },
  "openapi": "3.0.0",
