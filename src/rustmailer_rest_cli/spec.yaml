      "Envelope": {
        "properties": {
          "account_id": {
            "description": "The ID of the account owning the email.",
            "format": "uint64",
            "type": "integer"
          },
          "attachments": {
            "description": "A list of attachments included in the email, if any.\n\nEach `ImapAttachment` item contains metadata including the part ID and MIME type,\nwhich indicates the exact location of the attachment in the raw message structure.\nThis allows the backend to directly fetch specific attachments without retrieving\nthe entire message content.\n\nThis is particularly useful for accounts configured with minimal sync, where full\nmessage bodies are not cached locally. By including this data in the API response,\nthe client can request to download only the required attachment via a follow-up\nAPI call, improving both efficiency and user experience.\n\nDevelopers do not need to understand the internal IMAP part structure \u2014 this\nmetadata provides a clean abstraction for fetching specific attachments.\n**Note:** Available only for IMAP accounts.",
            "items": {
              "$ref": "#/components/schemas/ImapAttachment"
            },
            "type": "array"
          },
          "bcc": {
            "description": "The blind carbon copy (BCC) recipient(s) of the email, if any.",
            "items": {
              "$ref": "#/components/schemas/Addr"
            },
            "type": "array"
          },
          "body_meta": {
            "description": "Metadata for the email's body parts (e.g., plain text, HTML), if available.\n\nEach `EmailBodyPart` contains detailed metadata (such as part ID, content type,\nand charset) describing a portion of the email body. This enables precise access\nto body content, such as plain text or HTML sections, without downloading the full\nraw message from the server.\n\nThis is especially helpful for lightweight clients or minimized-sync accounts that\ndo not cache full email content. The frontend can pass this metadata back to the\nserver to retrieve only the desired portion of the message (e.g., the HTML body),\nwhich significantly reduces bandwidth and latency.\n\nBy abstracting the complexity of MIME part navigation, developers can efficiently\nretrieve specific parts of an email without handling the low-level IMAP structure.\n**Note:** Available only for IMAP accounts.",
            "items": {
              "$ref": "#/components/schemas/EmailBodyPart"
            },
            "type": "array"
          },
          "cc": {
            "description": "The carbon copy (CC) recipient(s) of the email, if any.",
            "items": {
              "$ref": "#/components/schemas/Addr"
