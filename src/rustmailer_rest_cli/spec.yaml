      "DSNConfig": {
        "description": "A structure representing the configuration for Delivery Status Notifications (DSN) in email sending.\n\nThe `DSNConfig` struct defines settings for requesting DSNs as part of the SMTP DSN extension\n(RFC 3461). It is used to configure how and when a mail server should notify the sender about\nthe delivery status of an email sent using a `MailEnvelope`. This is particularly useful for\ntracking delivery outcomes or debugging email sending issues, especially when combined with\nretry mechanisms (e.g., `Retry` struct).\n\n### Purpose\n- **Status Tracking**: Allows the sender to receive notifications about the success, failure,\nor delay of email delivery.\n- **Debugging**: Helps diagnose issues in email delivery by providing detailed status information.\n- **Customization**: Enables fine-grained control over DSN behavior, including what content to\nreturn and which recipients to track.\n- **Reliability**: Works with retry mechanisms to ensure robust email delivery workflows.\n\n### Usage\nThis struct is typically used with an SMTP client to configure DSN settings for an email defined\nby a `MailEnvelope`. For example, it can specify that DSNs should be sent for delivery failures\nand include full email content in the notification.\n\n### Example\n```\nuse NotifyOption::*;\nlet dsn_config = DSNConfig {\nret: ReturnContent::Full, // Assuming ReturnContent::Full is defined\nenvid: Some(\"unique-id-123\".to_string()),\nnotify: vec![Failure, Delay],\norcpt: Some(\"recipient@example.com\".to_string()),\n};\n// Use dsn_config with an SMTP client to request DSNs for an email.\n```",
        "properties": {
          "envid": {
            "description": "An optional envelope identifier for tracking the email (SMTP DSN `ENVID` parameter).",
            "type": "string"
          },
          "notify": {
            "description": "A list of conditions under which DSNs are requested (SMTP DSN `NOTIFY` parameter).",
            "items": {
              "$ref": "#/components/schemas/NotifyOption"
            },
            "type": "array"
          },
          "orcpt": {
            "description": "An optional original recipient address for DSN tracking (SMTP DSN `ORCPT` parameter).",
            "type": "string"
          },
          "ret": {
            "allOf": [
              {
                "$ref": "#/components/schemas/ReturnContent"
              },
              {
                "description": "Specifies the amount of email content to include in the DSN (e.g., headers only or full message).\nThis corresponds to the SMTP DSN `RET` parameter."
              }
            ],
            "description": "Specifies the amount of email content to include in the DSN (e.g., headers only or full message).\nThis corresponds to the SMTP DSN `RET` parameter."
          }
        },
        "required": [
          "ret",
          "notify"
        ],
        "title": "DSNConfig",
        "type": "object"
      },
