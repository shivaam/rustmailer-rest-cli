      "AppendReplyToDraftRequest": {
        "properties": {
          "draft_folder_path": {
            "description": "The path of the folder used to store drafts (IMAP accounts only).\n\nFor example: \"[Gmail]/Drafts\".\nThis can be obtained from the `name` field of the mailbox via the list-mailboxes endpoint.\nFor Gmail API accounts, this field is ignored.",
            "type": "string"
          },
          "html": {
            "description": "The HTML body of the reply email.\n\nThis field is optional and can be used to provide HTML content.",
            "maxLength": 50000,
            "minLength": 1,
            "type": "string"
          },
          "id": {
            "description": "The unique ID of the message, either IMAP UID or Gmail API MID.\n\n- For IMAP accounts, this is the UID converted to a string. It must be a valid numeric string\nthat can be parsed back to a `u32`.\n- For Gmail API accounts, this is the message ID (`mid`) returned by the API.",
            "type": "string"
          },
          "mailbox_name": {
            "description": "The name of the mailbox or label containing the original message.\n\n- For IMAP accounts, this is the mailbox name where the source message resides.\n- For Gmail API accounts, this refers to the label name associated with the source message.\nThis is used to locate the message being replied to.",
            "type": "string"
          },
          "preview": {
            "description": "A preview text for the reply email.\n\nThis optional field provides a short summary or preview of the reply content.",
            "maxLength": 200,
            "minLength": 1,
            "type": "string"
          },
          "text": {
            "description": "The plain text body of the reply email.\n\nThis field is optional and can be used to provide plain text content.",
            "maxLength": 10000,
            "minLength": 1,
            "type": "string"
          }
        },
        "required": [
          "mailbox_name",
          "id"
        ],
        "title": "AppendReplyToDraftRequest",
        "type": "object"
      },
