      "Retry": {
        "description": "A structure representing the configuration for retrying failed email sending attempts.\n\nThe `Retry` struct defines the retry strategy, delay duration, and maximum number of\nretry attempts for sending an email. It is used in conjunction with an SMTP client and\nthe `MailEnvelope` struct to handle transient failures during email transmission, such\nas network issues or temporary server errors.\n\n### Purpose\n- **Reliability**: Ensures emails are retried in case of temporary failures, improving\ndelivery success rates.\n- **Flexibility**: Allows customization of retry behavior (linear or exponential) to\nbalance between prompt retries and server load management.\n- **Control**: Limits the number of retries to prevent infinite loops in case of\npersistent failures.\n\n### Usage\nThis struct is typically used to configure an SMTP client to retry sending an email\n(defined by a `MailEnvelope`) when a failure occurs. For example, it can specify that\nretries should occur with a linear delay of 5 seconds up to 3 times.\n\n### Example\n```\nuse Strategy::*;\nlet retry_config = Retry {\nstrategy: Linear,\nseconds: 5,\nmax_retries: 3,\n};\n// Use retry_config with an SMTP client to handle email sending retries.\n```",
        "properties": {
          "max_retries": {
            "description": "The maximum number of retry attempts (0 means no retries).",
            "format": "uint32",
            "type": "integer"
          },
          "seconds": {
            "description": "The base delay (in seconds) between retry attempts.\nFor `Linear`, this is the fixed delay; for `Exponential`, this is the initial delay.",
            "format": "uint32",
            "type": "integer"
          },
          "strategy": {
            "allOf": [
              {
                "$ref": "#/components/schemas/Strategy"
              },
              {
                "description": "The retry strategy to use (Linear or Exponential)."
              }
            ],
            "description": "The retry strategy to use (Linear or Exponential)."
          }
        },
        "required": [
          "strategy",
          "seconds",
          "max_retries"
        ],
        "title": "Retry",
        "type": "object"
      },
