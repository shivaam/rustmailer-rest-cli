      "AccountCreateRequest": {
        "properties": {
          "date_since": {
            "allOf": [
              {
                "$ref": "#/components/schemas/DateSince"
              },
              {
                "description": "Controls initial synchronization time range\n\nWhen dealing with large mailboxes, this restricts scanning to:\n- Messages after specified starting point\n- Or within sliding window\n\n### Use Cases\n- Event-driven systems (only sync recent actionable emails)\n- First-time sync optimization for large accounts\n- Reducing server load during resyncs"
              }
            ],
            "description": "Controls initial synchronization time range\n\nWhen dealing with large mailboxes, this restricts scanning to:\n- Messages after specified starting point\n- Or within sliding window\n\n### Use Cases\n- Event-driven systems (only sync recent actionable emails)\n- First-time sync optimization for large accounts\n- Reducing server load during resyncs"
          },
          "email": {
            "description": "Email address associated with this account\n\nThis field represents the user's email address and is required for account creation.\nOnce set during account creation, the email address cannot be modified.",
            "type": "string"
          },
          "enabled": {
            "description": "Represents the account activation status.\n\nIf this value is `false`, all account-related resources will be unavailable\nand any attempts to access them should return an error indicating the account\nis inactive.",
            "type": "boolean"
          },
          "folder_limit": {
            "description": "Max emails to sync for this folder.\nIf not set, sync all emails.\notherwise sync up to `n` most recent emails (min 10).",
            "format": "uint32",
            "minimum": 100,
            "type": "integer"
          },
          "full_sync_interval_min": {
            "description": "Full sync interval (minutes), default 30m",
            "format": "int64",
            "maximum": 10080,
            "minimum": 10,
            "type": "integer"
          },
          "imap": {
            "allOf": [
              {
                "$ref": "#/components/schemas/ImapConfig"
              },
              {
                "description": "IMAP server configuration"
              }
            ],
            "description": "IMAP server configuration"
          },
          "incremental_sync_interval_sec": {
            "description": "Incremental sync interval (seconds), default 60s",
            "format": "int64",
            "maximum": 3600,
            "minimum": 10,
            "type": "integer"
          },
          "mailer_type": {
            "allOf": [
              {
                "$ref": "#/components/schemas/MailerType"
              },
              {
                "description": "Method used to access and manage emails."
              }
            ],
            "description": "Method used to access and manage emails."
          },
          "minimal_sync": {
            "description": "Minimal sync mode flag\n\nWhen enabled (`true`), only the most essential metadata will be synchronized:\nRecommended for:\n- Extremely resource-constrained environments\n- Accounts where only new message notification is needed",
            "type": "boolean"
          },
          "name": {
            "description": "Display name for the account (optional)",
            "type": "string"
          },
          "smtp": {
            "allOf": [
              {
                "$ref": "#/components/schemas/SmtpConfig"
              },
              {
                "description": "SMTP server configuration"
              }
            ],
            "description": "SMTP server configuration"
          },
          "use_proxy": {
            "description": "Optional proxy ID for establishing the connection to external APIs (e.g., Gmail, Outlook).\n- If `None` or not provided, the client will connect directly to the API server.\n- If `Some(proxy_id)`, the client will use the pre-configured proxy with the given ID for API requests.",
            "format": "uint64",
            "type": "integer"
          }
        },
        "required": [
          "email",
          "enabled",
          "mailer_type",
          "incremental_sync_interval_sec"
